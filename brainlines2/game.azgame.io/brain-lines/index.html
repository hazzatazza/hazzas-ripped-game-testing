<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- Local styles path -->
    <link rel="stylesheet" href="25020706/theme/game.css">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://googleapis.com" rel="stylesheet">
    <title>Brain Lines</title>
    <style type="text/css">
        .jss1:before {
            top: 0; width: 100%; filter: blur(16px); height: 100%;
            content: ""; display: block; opacity: .5; z-index: 0;
            position: absolute; background-size: cover;
            background-image: url("25020706/loading.png")
        }
    </style> 
    
    <script>
        var versionFolder = "25020706/";
        // Path reaching from /game.azgame.io/brain-lines/ to /games.azgame.io/
        var buildUrl = "../../games.azgame.io/game/brain-lines/" + versionFolder + "Build";
        
        var loaderUrl = buildUrl + "/brain-lines-v25020706.loader.js";
        var config = {
            dataUrl: buildUrl + "/brain-lines-v25020706.data.unityweb",
            frameworkUrl: buildUrl + "/brain-lines-v25020706.framework.js.unityweb",
            codeUrl: buildUrl + "/brain-lines-v25020706.wasm.unityweb",
            // CRITICAL: Updated path for level data to prevent 404 errors
            streamingAssetsUrl: "../../games.azgame.io/game/brain-lines/" + versionFolder + "StreamingAssets",
            companyName: "azgames.io",
            productName: "Brain Lines",
            productVersion: "25020706",
            // Forces fresh data to avoid cached 404 pages causing JSON crashes
            cacheControl: function (url) { return "no-cache"; },
            decompressionFallback: true
        };

        config.gameId = "brain-lines";
        config.eventLog = false;
        config.gdHost = false;

        function isHostOnGD() { return false; }
    </script>
    <!-- ONLY ONE script tag here. Removed the second one to fix the "already declared" error -->
    <script id="gmsoft-jssdk" src="../../games.azgame.io/lib/gmsoftsdk_v5.js"></script>
</head>

<body>
<div id="unity-container" style="display: none;">
    <canvas id="unity-canvas"></canvas> 
</div>
<div id="loadingBlock">
    <div class="jss31 jss34 jss1">
        <div class="spinner"></div>
        <div class="jss31 jss34 jss48" style="flex: 1 1 0%;">
            <div class="jss32">
                <div class="jss125">
                    <div class="jss123"><img src="25020706/logo.png"></div>
                </div>
            </div>
        </div>
        <div class="jss31 jss34" style="flex: 3 1 0%;">
            <div class="jss32">
                <div class="jss31 jss34 jss39 jss50 gameloader">
                    <div class="gameloader-game-name">Brain Lines</div>
                    <div class="gameloader-logo"><img id="game-logo" src="25020706/loading.png"></div>
                    <div class="gameloader-progressbar">
                        <div class="gameloader-progressbar-progress" id="progress_fill" style="width: 0%;"></div>
                    </div>
                    <div class="gameloader-progress-info">Game Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script> 
    var progressElement = document.getElementById('progress_fill');
    var container = document.getElementById("unity-container");
    var canvas = document.getElementById("unity-canvas");
    var loadingBar = document.querySelector("#loadingBlock");
    var progress_text = document.querySelector(".gameloader-progress-info");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressElement.style.width = 100 * progress + "%";
            progress_text.innerText = "Downloading: " + Math.round(progress*100) + "%";
        }).then((unityInstance) => {
            loadingBar.style.display = "none";
            container.style.display = "block";
            window.focus();
        }).catch((message) => { console.error(message); });
    };
    document.body.appendChild(script);
</script>
</body> 
</html>
