<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>

        <title>Rocket League 2D - Fullscreen</title>

        <style>
            body {
              background: #000000; /* Dark background to match the game */
              color:#cccccc;
              margin: 0px;
              padding: 0px;
              border: 0px;
              
              /* Centering logic */
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              width: 100vw;
              overflow: hidden; /* Removes scrollbars */
            }

            canvas {
              image-rendering: pixelated; /* Keeps pixel art sharp when scaled up */
              -webkit-interpolation-mode: nearest-neighbor;
              -ms-touch-action: none;
              margin: 0px;
              padding: 0px;
              border: 0px;
              display: block;

              /* Scaling logic: make the game bigger but stay within screen bounds */
              max-width: 100%;
              max-height: 100%;
              width: auto;
              height: auto;
              
              /* Optional: Add a subtle shadow to make the game pop */
              box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            }

            div.gm4html5_div_class {
              margin: 0px;
              padding: 0px;
              border: 0px;
              display: flex;
              justify-content: center;
              align-items: center;
            }

            /* Fullscreen API support */
            :-webkit-full-screen #canvas {
                 width: 100%;
                 height: 100%;
            }
            :-webkit-full-screen {
               width: 100%;
               height: 100%;
            }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1024" height="384">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/RocketLeague2D.js?XLEBC=1995985343"></script>
        <script>window.onload = GameMaker_Init;</script>
        <script defer src="https://static.itch.io/htmlgame.js" type="text/javascript"></script>
    </body>
</html>
