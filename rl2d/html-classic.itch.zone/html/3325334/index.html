<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>

        <title>Rocket League 2D - HD Sharp</title>

        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #000; /* Deep black background */
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden; /* Hide scrollbars */
            }

            #gm4html5_div_id {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: 100%;
            }

            canvas {
                /* Sizing: Makes the game fill most of the screen */
                width: 98vw !important; 
                height: auto !important;
                max-height: 98vh;
                
                /* Quality: Prevents the "low quality" blur when stretching */
                image-rendering: -moz-crisp-edges;         /* Firefox */
                image-rendering: -webkit-optimize-contrast; /* Safari */
                image-rendering: pixelated;                 /* Chrome / Edge */
                -ms-interpolation-mode: nearest-neighbor;   /* IE */
                
                display: block;
                box-shadow: 0 0 30px rgba(0,0,0,0.5);
            }

            /* Extra styles for GameMaker UI elements */
            div.gm4html5_login {
                 padding: 20px;
                 position: absolute;
                 border: solid 2px #000000;
                 background-color: #404040;
                 color:#00ff00;
                 border-radius: 15px;
            }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1024" height="384">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/RocketLeague2D.js?XLEBC=1995985343"></script>
        <script>window.onload = GameMaker_Init;</script>
        <script defer src="https://static.itch.io/htmlgame.js" type="text/javascript"></script>
    </body>
</html>
