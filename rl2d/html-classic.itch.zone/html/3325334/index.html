<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta charset="utf-8"/>

        <title>Rocket League 2D - Ultra Wide</title>

        <style>
            html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #000;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }

            #gm4html5_div_id {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100vw;
                height: 100vh;
            }

            canvas {
                /* This is the magic part */
                width: 95vw !important;  /* Fills 95% of screen width */
                height: auto !important; /* Keeps the ratio so it doesn't look squished */
                
                /* If the height is still too small, we force it larger */
                max-height: 90vh; 
                
                image-rendering: pixelated;
                -webkit-interpolation-mode: nearest-neighbor;
                box-shadow: 0 0 50px rgba(0,0,0,1);
                border: 1px solid #333;
            }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1024" height="384">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/RocketLeague2D.js?XLEBC=1995985343"></script>
        <script>window.onload = GameMaker_Init;</script>
        <script defer src="https://static.itch.io/htmlgame.js" type="text/javascript"></script>
    </body>
</html>
