<script>window.yaContextCb=window.yaContextCb||[]</script>

</head>
<body>
<div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
<canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%;"></canvas>
<div id="unity-loading-bar">
<div id="unity-logo"></div>
<div id="unity-progress-bar-empty">
<div id="unity-progress-bar-full"></div>
</div>
</div>
</div>
<script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Escape from lava.loader.js";
      var config = {
        dataUrl: buildUrl + "/Escape from lava.data.unityweb",
        frameworkUrl: buildUrl + "/Escape from lava.framework.js.unityweb",
        codeUrl: buildUrl + "/Escape from lava.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Invisible Studio",
        productName: "Escape Running Head",
        productVersion: "0.2",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
      }
      loadingBar.style.display = "block";

      var script = document.createElement("script");
	  var UnityInst = null;
	  
	  var gameReady = false;
	  var sdk;
	  var player;
	  var playerId;
	  var playerName;
	  var playerPhoto;
	  var payments = null;
	  var itemsShop = [];
	  var gameShop = {};
	  var imageCurrency;

	  var funcWaiting = [];

      script.src = loaderUrl;

	  YaGames.init().then(ysdk => {
			sdk = ysdk;

			InitPayments();

			sdk.getPlayer({ scopes: true }).then(_player => {
				player = _player;

					script.onload = () => {
					createUnityInstance(canvas, config, (progress) => {
					  progressBarFull.style.width = 100 * progress + "%";
					}).then((unityInstance) => {
					  UnityInst = unityInstance;

					  for (let i = 0; i < funcWaiting.length; i++)
					  {
					       window[funcWaiting[i]]();
					  }
					  

					  loadingBar.style.display = "none";
					}).catch((message) => {
					  alert(message);
					});
				  };
				  document.body.appendChild(script);

				  if (player.getMode() === 'lite')
				  {
						// Čćšīź ķå ąāņīščēīāąķ.
				  }
				  else
				  {
						playerId = player.getUniqueID();
						playerName = player.getName();
						playerPhoto = player.getPhoto("small");
				  }
			});
      });

    </script>
<script>

		function FocusGame() {
            window.focus();
            canvas.focus();
        }

		function GameReadyF()
		{
			if (gameReady == false)
			{
				gameReady = true;
				sdk.features.LoadingAPI?.ready();

				showFullscrAd();
			}

		}

	  function showFullscrAd() {
		sdk.adv.showFullscreenAdv({
			callbacks:
			{
				onOpen: () => {
					UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 0);
				},
				onClose: (wasShown) => {
					UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 1);
					FocusGame();
				},
				onError: (error) => {
					UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 1);
					FocusGame();
				}
			}
			})
	  }

		function GetDomainF()
		{
			var data = sdk.environment.i18n.tld;
			UnityInst.SendMessage('YandexSDK', 'GetDomain', String(data));

			sdk.features.GamesAPI.getAllGames().then(({games, developerURL}) => {

				UnityInst.SendMessage('YandexSDK', 'GetAllGames', JSON.stringify(games));
			});
		}

		function GetDeviceF()
		{
			var nVer = navigator.appVersion;
			var data = /Mobile|mini|Fennec|Android|iP(ad|od|hone)/.test(nVer);


			//var data = window.matchMedia("(hover: none)").matches;
			//var data = sdk.deviceInfo.isMobile();
			//var data_userAgent = (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent));
			UnityInst.SendMessage('YandexSDK', 'GetDevice', String(data));
		}

		function SaveExternF(data)
		{
    		var myobj = JSON.parse(data);
    		player.setData(myobj, true);
		}

		function LoadExternF()
		{
			if (player != null)
			{
					player.getData().then(_date => {
        			const myJSON = JSON.stringify(_date);
        			UnityInst.SendMessage('YandexSDK', 'SetPlayerInfoCloud', myJSON);
    			});
			}
			else
			{
				UnityInst.SendMessage('YandexSDK', 'SetPlayerInfoCloud', "");
			}

		}
		
		function GetLangF()
		{
			UnityInst.SendMessage('YandexSDK', 'SetLang', sdk.environment.i18n.lang);
		}

		function AdvWeaponF()
		{
    		sdk.adv.showRewardedVideo({
				callbacks: {
					onOpen: () => {
					    UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 0);
					},
					onRewarded: () => {
					    UnityInst.SendMessage('YandexSDK', 'UnlockAdvWeapon', 1);
					},
					onClose: () => {
						UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 1);
					}, 
					onError: (e) => {
						UnityInst.SendMessage('YandexSDK', 'SetListenerVolume', 1);
					}
				}
			})
		}


		function InitPayments()
		{
			sdk.getPayments({ signed: true }).then(_payments => {
				payments = _payments;
				InitCatalog();
			}).catch(err => {
			});

		}
		function InitCatalog()
		{
			payments.getCatalog().then(products =>
			{
				for (let i = 0; i < products.length; i++)
				{
					let subArray = {};
					subArray["id"] = products[i].id;
					subArray["priceValue"] = products[i].priceValue;

					itemsShop.push(subArray);
				}

				gameShop["items"] = itemsShop;

				if (products.length > 0)
				{
					imageCurrency = products[0].getPriceCurrencyImage("medium");
					gameShop["imageCurrency"] = imageCurrency;
				}
			}
			);
		}
		function GetCatalogF()
		{
			if (UnityInst == null)
			{
				if (funcWaiting.indexOf("GetCatalogF") == -1)
				{
					funcWaiting.push("GetCatalogF");
				}
				return;
			}

			let result = JSON.stringify(gameShop);
			UnityInst.SendMessage("ManagerShop", "SetPriceYan", String(result));
		}



		function Purchase(purch_id)
		{
			payments.purchase({ id: purch_id }).then(purchase => {
				UnityInst.SendMessage("ManagerShop", "BuyAndSave", String(purch_id));
				payments.consumePurchase(purchase.purchaseToken);
			});
		}
		function consumePurchase()
		{
			payments.getPurchases().then(purchases => purchases.forEach(DoConsumePurchase));
		}
		function DoConsumePurchase(purchase)
		{
			UnityInst.SendMessage("ManagerShop", "BuyAndSave", String(purchase.productID));
			payments.consumePurchase(purchase.purchaseToken);
		}


		function ClipboardCopyF(text)
		{
			navigator.clipboard.writeText(text);
		}


		window.onbeforeunload = () => {
			UnityInst.SendMessage("YandexSDK", "CloseCallback");
		}

    </script>
