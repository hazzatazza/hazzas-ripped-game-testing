<div style="display: none" id="countdown-overlay" role="dialog" aria-live="assertive" aria-label="Таймер обратного отсчёта">
    <div id="countdown" aria-atomic="true">5</div>
</div>

<script>
    // Простой обратный отсчёт 5 → 0 с последующим скрытием оверлея
    function startCountdown(seconds = 5) {
        const overlay = document.getElementById('countdown-overlay');
        const counter = document.getElementById('countdown');
        overlay.classList.remove('hide');
        overlay.style.display = 'flex';
        let value = seconds;

        // Показать начальное значение
        counter.textContent = value;

        const tick = setInterval(() => {
            value -= 1;

            if (value >= 1) {
                counter.textContent = value;
            }

            if (value <= 1) {
                clearInterval(tick);
                // Небольшая пауза на «0», затем плавно убираем оверлей
                setTimeout(() => {
                    overlay.classList.add('hide');
                    overlay.setAttribute('aria-hidden', 'true');
                    overlay.addEventListener('transitionend', () => {
                        // overlay.remove(), { once: true }
                        overlay.style.display = 'none';
                    });
                }, 900);
            }
        }, 1000);
    };
</script>
