// GLOBAL VAR

function preload() {
    const progressbarElem = document.querySelector('#progressbar');
    let manager = new THREE.LoadingManager();
    manager.onStart = function ( url, itemsLoaded, itemsTotal ) {
        console.log( 'Started loading file: ' + url + '.\nLoaded ' + itemsLoaded + ' of ' + itemsTotal + ' files.' );
    };
    manager.onLoad = function ( ) {
        console.log( 'Loading complete!');
        init();
        // hide the loading bar
        const loadingElem = document.querySelector('#loading');
        loadingElem.style.display = 'none';
    };
    manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
        console.log( 'Loading file: ' + url + '.\nLoaded ' + itemsLoaded + ' of ' + itemsTotal + ' files.' );
        progressbarElem.style.width = `${itemsLoaded / itemsTotal * 100 | 0}%`;
        PROGRESS_TEXT.innerHTML = `${itemsLoaded / itemsTotal * 100 | 0}%`;
    };
    manager.onError = function ( url ) {
        console.log( 'There was an error loading ' + url );
    };

    var loader = new THREE.FBXLoader( manager );
    // load base character model
    for (const model of Object.values(BaseModel)) {
        loader.load( model.url, function ( fbx ) {
            model.fbx = fbx;
            model.fbx.scale.set(0.26,0.26,0.26);
        });
    }
    // load anims
    for (const model of Object.values(Anims)) {
        loader.load( model.url, function ( fbx ) {
            //model.fbx = fbx;
            model.animation = fbx.animations[ 0 ];
        });
    }
    // load textures
    var loaderTex = new THREE.TextureLoader(manager);
    for (const img of Object.values(Textures)) {
        loaderTex.load( img.url, function(texture) {
            texture.encoding = THREE.sRGBEncoding;
            img.texture = texture;
        });
    }
    // load audio
    Sound.listener = new THREE.AudioListener();
    const audioLoader = new THREE.AudioLoader( manager );
    for (const key of Object.values(Sound)) {
        audioLoader.load( key.url, function(buffer) {
            key.sound = new THREE.Audio( Sound.listener );
            key.sound.setBuffer( buffer );
            key.sound.setVolume( 1 );
        });
    }
}

function init(){
  LaggedAPI.init('cuber_rushg_ints','lagdevaF3001');
    if (is_touch_device()){
        onMobile = true;
    }
    MENU_UI.style.visibility = "visible";

    renderer = new THREE.WebGLRenderer({canvas: CANVAS, antialias: true,});
    renderer.setPixelRatio( 0.6 );

    renderer.setSize( window.innerWidth, window.innerHeight );
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMapEnabled = true;
    //renderer.shadowMap.autoUpdate = false;

    camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 14000 );
    camera.position.set(-300, 700, -1000);
    camera.lookAt(0,0,600);
    camera.add( Sound.listener );

    scene = new THREE.Scene();
    scene.background = new THREE.Color( 0x94D3F4 ).convertSRGBToLinear();

    // fog
    const color = new THREE.Color( 0x94D3F4 ).convertSRGBToLinear();;
    const near = 3000;
    const far = 5000;
    scene.fog = new THREE.Fog(color, near, far);

    setUpMenu();

    window.addEventListener( 'resize', onWindowResize, false );

    MENU_BESTSCORE.innerHTML = Math.round(bestScore);
    animate();
}

function setUpMenu() {

    // shadows
    let shadowLight = new THREE.DirectionalLight(0x00c1f7, 1);
    shadowLight.position.set(1000, 500, -100);
    shadowLight.castShadow = true;
    shadowLight.shadow.camera.left = -3000;
    shadowLight.shadow.camera.right = 3000;
    shadowLight.shadow.camera.top = 2000;
    shadowLight.shadow.camera.bottom = -2000;
    shadowLight.shadow.camera.near = 1;
    shadowLight.shadow.camera.far = 6000;
    shadowLight.shadow.mapSize.width = 512; // default is 512
    shadowLight.shadow.mapSize.height = 512; // default is 512
    scene.add(shadowLight);

    let light = new THREE.HemisphereLight( 0xffffff , 0xffffff, 0.7);
    light.position.set(0, 1000, 0 );
    scene.add( light );

    // ground
    let ground_mesh = new THREE.Mesh( new THREE.BoxBufferGeometry( 300, 100, 6000 ), new THREE.MeshLambertMaterial( { color: 0xd6f6ff} ) );
    //ground_mesh.castShadow = true;
	ground_mesh.receiveShadow = true;
    ground_mesh.position.z = 2000;
    ground_mesh.position.x += 10;
    ground_mesh.position.y += 25;
    scene.add( ground_mesh );

    // populate with buildings
    for (let i = 100; i < 5000; i += 200){
        console.log(i);
        new Building(i);
    }
    player = new Player();

function setUpGame() {
    Sound.button.sound.play();
    possibleHeight = 0;
    gameOver = false;
    speed = defaultSpeed;

    state = "game";
    INSTRUCTION.style.visibility = "visible";
    //player = new Player();
    spawner = new Spawner();

    MENU_UI.style.visibility = "hidden";
    GAME_UI.style.visibility = "visible";

    document.addEventListener('touchstart', touchStart, false);
    document.addEventListener('touchend', touchEnd, false);
    document.addEventListener('touchmove', touchMoved, false);

    document.addEventListener('mousemove', mouseMoved, false);
    document.addEventListener('mousedown', mouseDown, false);
    document.addEventListener('mouseup', mouseUp, false);
}

function Player() {
    var self = {
        model: null,
        group: null,
        cubeArray: [],
        maxX: 130,
        minX: -117,
        fallTimer: 61,
        mixer: null,
    }
    self.init = function(){
        self.group = new THREE.Object3D();
        scene.add(self.group);

        /*self.model = new THREE.Mesh( new THREE.BoxBufferGeometry( 50, 100, 50 ), new THREE.MeshLambertMaterial( { color: 0x00b3ff} ) );*/
        self.model = THREE.SkeletonUtils.clone(BaseModel.character.fbx);
        self.model.traverse(function ( child ) {
            if ( child instanceof THREE.Mesh ) {
                const oldMat = child.material;
                child.castShadow = true;
				child.receiveShadow = true;
                child.material = new THREE.MeshLambertMaterial( {  map: oldMat.map, skinning: true});
            }
        });

        self.model.scale.set(0.5,0.5,0.5);
        self.model.position.y += 77; //125

        self.mixer = new THREE.AnimationMixer(self.model);
        const firstClip = Anims.idle.animation;
        const SecondClip = Anims.fall.animation;
        self.idle = self.mixer.clipAction(firstClip);
        self.fall = self.mixer.clipAction(SecondClip);
        self.idle.play();

        self.fall.setLoop( THREE.LoopOnce );
        self.fall.clampWhenFinished = true;

        self.fall._clip.name = "fall";
        self.mixer.addEventListener( 'finished', function( e ) {
            if (e.action._clip.name == "fall"){
                gameOverFunction();
                console.log("dead");
            }
        });

        self.group.add(self.model);
        self.addCube();
    }
    self.addCube = function(){
        /*let cube = new THREE.Mesh( new THREE.BoxBufferGeometry( 50, 50, 50 ), new THREE.MeshLambertMaterial( { color: 0xfff700} ) );*/
        let cube = BaseModel.cube.fbx.clone();
        cube.traverse(function ( child ) {
            if ( child instanceof THREE.Mesh ) {
                child.material = new THREE.MeshLambertMaterial( { color: 0xfff700} );
                child.castShadow = true;
				child.receiveShadow = true;
            }
        });

        cube.position.y += 100;
        //FX
        if (score > 1){
            Sound.pickup.sound.play();
            let v = new THREE.Vector3(self.group.position.x, 100, self.group.position.z);
            new BloodParticles(v);
            self.addCubeFX(v);
        }
        for (let i in self.cubeArray){
            self.cubeArray[i].position.y += 50;
        }
        self.model.position.y += 50;
        self.group.add(cube);
        self.cubeArray.push(cube);
        // raycaster
        cube.raycaster = new THREE.Raycaster();
        cube.line = null;
        cube.falling = 0;
    }
    self.collisionCheck = function() {
        if (score < 2) return;
        for (let i in self.cubeArray){
            if (self.cubeArray[i].falling <= 0){
               var dir = new THREE.Vector3(0,0,1);
                var pos = self.group.position.clone();
                pos.y = self.cubeArray[i].position.y;

                self.cubeArray[i].raycaster.set(pos,dir);
                let intersect = self.cubeArray[i].raycaster.intersectObjects(collisionArray);
                if (intersect.length>0 && intersect[0].distance<100){
                    let index = collisionArray.indexOf(intersect[0].object);
                    let object = collisionArray[index];
                    if (object.add == true){
                        self.addCube();
                        scene.remove(object);
                        scene.remove(object.model);
                        collisionArray.splice(index,1);
                    }
                    else if (object.remove == true){
                        //self.group.remove(self.cubeArray[i]);
                        buildingsArray.push(self.cubeArray[i]);
                        self.cubeArray.splice(i,1);
                        self.fallTimer = 60;
                    }
                }
            }
        }

        // if no cube to stand on, play dead animation and gameOver
        if (self.cubeArray.length < 1 && !gameOver){
            Sound.gameOver.sound.play();
            self.mixer.stopAllAction();
            self.fall.fadeIn(0.1);
            self.fall.play();
            gameOver = true;
            speed = 0;
            //self.model.position.y = 100;
            INSTRUCTION.style.visibility = "hidden";
        }
    }
    self.addCubeFX = function(spawnPos) {
        // exclamation mark
        let spriteMaterial = new THREE.SpriteMaterial({map:Textures.plusOne.texture});
        let sprite = new THREE.Sprite(spriteMaterial);
        sprite.timer = 30;
        scene.add(sprite);
        sprite.scale.set(40,40,40);
        sprite.position.copy(spawnPos);
        sprite.position.x -= 70;
        spriteArray.push(sprite);
    }
    self.trailFX = function() {
        //trail fx
        let mat = new THREE.MeshBasicMaterial({map: Textures.trail.texture, side: THREE.DoubleSide, opacity: 0.3, });
        let geom = new THREE.PlaneGeometry( 50, 50, 100);
        let mesh = new THREE.Mesh( geom, mat );
        mesh.rotation.x = THREE.Math.degToRad(120);
        mesh.timer = 100;
        scene.add(mesh);
        mesh.position.copy(self.group.position);
        mesh.position.y = 70;
        mesh.position.z = 0;
        trailArray.push(mesh);
    }
    self.update = function(dt){
        self.mixer.update(dt);
        self.collisionCheck();

        for (let i in buildingsArray){
            buildingsArray[i].position.z -= speed*dt;
            if (buildingsArray[i].position.z < -500 && buildingsArray[i].building){
                scene.remove(buildingsArray[i]);
                buildingsArray.splice(i,1);
                new Building(5000);
            }
        }

        for (let i in trailArray){
            trailArray[i].position.z -= 300*dt;
            trailArray[i].timer -= 40*dt;
            if (trailArray[i].timer < 0){
                scene.remove(trailArray[i]);
                trailArray.splice(i,1);
            }
        }

        for (let i in collisionArray){
            collisionArray[i].position.z -= speed*dt;
            if (collisionArray[i].model){
                collisionArray[i].model.position.copy(collisionArray[i].position);
            }
        }
        if (self.fallTimer < 61){
            self.fallTimer -= dt*200;
        }
        if (self.fallTimer <= 0 && !gameOver){
            for (let i in self.cubeArray){
                if (i == 0)
                    self.cubeArray[i].position.y = 100;
                else
                    self.cubeArray[i].position.y = (50*i)+100;
            }
            console.log(self.cubeArray.length)
            self.model.position.y = (self.cubeArray.length*50)+80;
            self.fallTimer = 61;
        }

        if (move.lastX && !gameOver){
            self.group.position.x -= (move.movementX*5)*dt;

            if (self.group.position.x > self.maxX)
                self.group.position.x = self.maxX;
            if (self.group.position.x < self.minX)
                self.group.position.x = self.minX;
        }

        // score
        if (!gameOver && state == "game") {
            score += 1*dt;
            SCORE.innerHTML = Math.round(score);
        }
        if (score > 4 && INSTRUCTION.style.visibility == "visible"){
            INSTRUCTION.style.visibility = "hidden";
        }
        for (let i in spriteArray){
            spriteArray[i].position.y += 100*dt;
            spriteArray[i].timer -= 40*dt;
            if (spriteArray[i].timer < 0){
                scene.remove(spriteArray[i]);
                spriteArray.splice(i,1);
            }
        }
        self.trailFX();
    }
    self.init();
    return self;
}

function Pickup(){
    var self = {
        model: null,
    }
    self.init = function(){
        let cube = new THREE.Mesh( new THREE.BoxBufferGeometry( 70, 50, 50 ), new THREE.MeshBasicMaterial( { color: 0xfff700, visible: false,} ) );
        self.model = BaseModel.cube.fbx.clone();
        self.model.traverse(function ( child ) {
            if ( child instanceof THREE.Mesh ) {
                child.material = new THREE.MeshLambertMaterial( { color: 0xfff700, side: THREE.DoubleSide} );
                child.castShadow = true;
				child.receiveShadow = true;
            }
        });

        cube.position.y += 100;
        cube.position.z = 3000;
        let randXArray = [120, 60, 0, -60, -120];
        let randX = rand(0,4)
        cube.position.x = randXArray[randX];

        cube.model = self.model;
        scene.add(self.model);
        scene.add(cube);
        cube.add = true;

        collisionArray.push(cube);
        possibleHeight ++;
    }

    self.init();
    return self;
}

function Wall(spawnX, spawnY){
    var self = {
        model: null,
    }
    self.init = function(){
        let cube = new THREE.Mesh( new THREE.BoxBufferGeometry( 70, 50, 50 ), new THREE.MeshBasicMaterial( { color: 0xFF4500, visible: false} ) );
        self.model = BaseModel.cube.fbx.clone();
        self.model.traverse(function ( child ) {
            if ( child instanceof THREE.Mesh ) {
                child.material = new THREE.MeshLambertMaterial( { color: 0xFF4500} );
                child.castShadow = true;
				child.receiveShadow = true;
            }
        });

        cube.position.y += 100;
        cube.position.z = 4500;
        cube.position.x = spawnX;
        if (spawnY){
            let spawnYRandom = spawnY;
            if (spawnY == (possibleHeight-1)){
                spawnYRandom = rand(0,spawnY);
            }
            cube.position.y += (spawnYRandom*55);
        }
        cube.model = self.model;
        scene.add(cube);
        scene.add(self.model);
        cube.remove = true;
        collisionArray.push(cube);
    }

    self.init();
    return self;
}

function Spawner(){
    var self = {
        timer: 0,
        randomTimeToSpawn: rand(1,5),
        lastSpawn: null,
    }
    self.spawn = function(){
        let type = rand(1,3);
        if (type == 1 && self.lastSpawn == "pickup"){
            if (possibleHeight > 0){
                new Wall(120);
                new Wall(60);
                new Wall(0);
                new Wall(-60);
                new Wall(-120);
                if (possibleHeight > 1) {
                    for (let i = 1; i < possibleHeight; i++){
                        possibleHeight -= 1;
                        new Wall(120,i);
                        new Wall(60,i);
                        new Wall(0,i);
                        new Wall(-60,i);
                        new Wall(-120,i);
                    }
                }
                self.lastSpawn = "wall"
            }
            else {
                type = 2;
                self.lastSpawn = "pickup"
            }
        }
        if (type == 2){
            new Pickup();
            self.lastSpawn = "pickup"
        }
        else {
            new Pickup();
            self.lastSpawn = "pickup"
        }
    }
    self.update = function(delta){
        self.timer += 2*delta;
        if ( self.timer > self.randomTimeToSpawn ){
            self.spawn();
            self.timer = 0;
            self.randomTimeToSpawn = rand(1,5);
        }
    }
    return self;
}

function Building(spawnZ) {
    var self = {
        color: new THREE.Color( 0x0E86DE ).convertSRGBToLinear(),
    }
    self.init = function() {
        let r  = rand(1,2);
        let rX = rand(1,2);
        let model = null;
        if (r == 1) {
            model = BaseModel.building.fbx.clone();
            model.traverse(function ( child ) {
                if ( child instanceof THREE.Mesh ) {
                    child.material = new THREE.MeshLambertMaterial( { color: self.color } );

                }
            });
            model.scale.set(1.2,1.2,1.2);
        }
        else {
            model = BaseModel.building2.fbx.clone();
            model.traverse(function ( child ) {
                if ( child instanceof THREE.Mesh ) {
                    child.material = new THREE.MeshLambertMaterial( { color: self.color } );
                }
            });
            model.scale.set(1.2,1.2,1.2);
        }

        scene.add(model);
        if (rX == 1)
            model.position.x = rand(800,1000);
        else
            model.position.x = rand(-200,-400);
        model.position.y = -400;
        if (spawnZ)
            model.position.z = spawnZ;
        else
            model.position.z = 3500;
        model.building = true;
        buildingsArray.push(model);
    }

    self.init();
    return self;
}

function BloodParticles(spawnPos){
    var self = {
        particles: [],
        max: 10,
        mesh: null,
        index: null,
    }
    self.init = function() {
        let geo = new THREE.Geometry();
        for(let i=0; i<self.max; i++) {
            let particle = {
                position: new THREE.Vector3(
                      rand(-20, 20),
                      rand(-20, 20),
                      rand(-20, -20)),
                velocity: new THREE.Vector3(
                      rand(-3, 3),
                      5,
                      rand(-3, 3)),
                acceleration: new THREE.Vector3(0, -0.5, 0),
            }
            self.particles.push(particle)
            geo.vertices.push(particle.position)
        }
        var mat = new THREE.PointsMaterial({color:0xFF3300,size: 100, map: Textures.explosion.texture, opacity: 0.4, transparent: true, })
        self.mesh = new THREE.Points(geo,mat)
        self.mesh.position.copy(spawnPos);
        scene.add(self.mesh);
    }
    self.update = function(){
        self.particles.forEach(p => {
            p.velocity.add(p.acceleration);
            p.position.add(p.velocity);
            self.mesh.material.size -= 0.35;
        })
        self.mesh.geometry.verticesNeedUpdate = true;
        if (self.mesh.material.size < 0){
            scene.remove(self.mesh);
            for (let i in bloodFXArr){
                if (bloodFXArr[i].mesh.uuid == self.mesh.uuid)
                    bloodFXArr.splice(i,1);
            }
        }
    }

    self.init();
    bloodFXArr.push(self);
    return self;
}

/*HELPER FUNCTIONS*/
function rand(min, max) {
  min = Math.ceil(min);
  max = Math.floor(max);
  return Math.floor(Math.random() * (max - min + 1)) + min; //The maximum is inclusive and the minimum is inclusive
}

function onWindowResize() {

    lastX: null,

function touchStart(event) {
    let touch = event.changedTouches[0];
    move.lastX = touch.pageX;
}

function touchEnd(event) {
    move.lastX = null;
    move.movementX = 0;
}

function touchMoved(event) {
    let touch = event.changedTouches[0];
    if (move.lastX){
        move.movementX = touch.pageX - move.lastX;
    }
}

function mouseDown(event) {
   move.lastX = event.pageX;
}

function mouseUp(event) {
    move.lastX = null;
    move.movementX = 0;
}

function mouseMoved(event) {
    if (move.lastX){
        move.movementX = event.pageX - move.lastX;
    }
}
