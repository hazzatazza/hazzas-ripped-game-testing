<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title>YT Game Wrapper WebGL Template</title>
  <link rel="stylesheet" href="TemplateData/style.css" nonce="2yAfDCmkWznPau12iYfJ2Q">
  <script src="https://www.youtube.com/game_api/v1" nonce="2yAfDCmkWznPau12iYfJ2Q">// Load YT Game API code</script>
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=100% height=100% tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
  </div>


  <script nonce="2yAfDCmkWznPau12iYfJ2Q"> // Logic for Unity contianer
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var fullscreenOverlayButton = document.querySelector("#unity-overlay-fullscreen-button");
    var quitcanvas = document.querySelector("#quit-canvas");
    var warningBanner = document.querySelector("#unity-warning");
    var firstFrameSent = false;
    var gameReady = false;

    // For YT it is strongly encouraged that all warnings / errors show in
    // console and banners should be in game as needed to not confuse users.
    // 
    // If needed please uncomment section below to show a temporary message 
    // banner/ribbon for a few seconds, or a permanent error message on top 
    // of the canvas if type=='error'.
    function unityShowBanner(msg, type) {
      // function updateBannerVisibility() {
      //   warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      // }
      // var div = document.createElement('div');
      // div.innerHTML = msg;
      // warningBanner.appendChild(div);
      // if (type == 'error') div.style = 'background: red; padding: 10px;';
      // else {
      //   if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
      //   setTimeout(function() {
      //     warningBanner.removeChild(div);
      //     updateBannerVisibility();
      //   }, 5000);
      // }
      // updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/crazy_kick_v1.3.loader.js";
    var config = {
        arguments: [],
        dataUrl: buildUrl + "/crazy_kick_v1.3.data.unityweb",
        frameworkUrl: buildUrl + "/crazy_kick_v1.3.framework.js.unityweb",
        codeUrl: buildUrl  + "/crazy_kick_v1.3.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Voodoo",
        productName: "Crazy kick",
        productVersion: "1.0.0",
        showBanner: unityShowBanner,
    };

    function sharedSendFirstFrame(){
      if( firstFrameSent == true )
        return;

      ytgame.game.firstFrameReady();
      firstFrameSent = true;
      console.log("******js:SendFirstFrameReady");
    }

    function sharedSendGameReady(){
      if( gameReady == true )
        return;

      ytgame.game.gameReady();
      gameReady = true;
      console.log("******js:SendGameReady");
    }


    // By default, Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";

      // To lower canvas resolution on mobile devices to gain some
      // performance, uncomment the following line:
      // config.devicePixelRatio = 1;

    } else {
      // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }

    loadingBar.style.display = "block";


    var unityGameInstance = null;
    // Setup the Unity section once zip file is downloaded and decompressed
    function InitUnitySection() {
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            unityGameInstance = unityInstance;
            gameInstance = unityInstance;
            loadingBar.style.display = "none";
          }).catch((message) => {
            console.error(message);
          });
      };

      document.body.appendChild(script);
    }

    function onPageLoaded() {
      ytgame.game.loadData().then(onYoutubeDataLoaded);
    };

    function onYoutubeDataLoaded(data) {
      if (data == "") {
        console.log("youtube remote data is empty, use default data instead");
      }
      remoteData = data == "" ? defaultRemoteData : data;
      console.log("******START GAME WITH PRELOADED DATA: " + remoteData);
      InitUnitySection();
    }

    function resumeGame(){
      if( gameInstance !== null)
        gameInstance.SendMessage("YTGameWrapper", "ReceiveOnChangeFocusEvent", "true");
    }

    function pauseGame(){
      if( gameInstance !== null)
        gameInstance.SendMessage("YTGameWrapper", "ReceiveOnChangeFocusEvent", "false");
    }

    window.document.addEventListener("visibilitychange", 
        ()=>{
            if(document.visibilityState == "visible")
              resumeGame();
            else
              pauseGame();
        }
    );

    var gameInstance = null;
    var defaultRemoteData = ``;
    var remoteData = "";

    window.addEventListener("load", onPageLoaded);

    

  </script>
</body>
</html>
